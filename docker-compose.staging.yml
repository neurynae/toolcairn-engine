##
## ToolPilot Staging Stack
## Runs on the same VPS as production but isolated network + volumes + ports.
## Usage: docker compose -f docker-compose.staging.yml up -d
##

services:
  api-staging:
    image: ghcr.io/neurynae/toolcairn-engine/api:${IMAGE_TAG:-staging}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TOOLPILOT_MODE: staging
      MEMGRAPH_URL: bolt://memgraph-staging:7687
      QDRANT_URL: http://qdrant-staging:6333
      DATABASE_URL: postgresql://toolpilot:${STAGING_DB_PASS:-staging}@postgres-staging:5432/toolpilot_staging
      REDIS_URL: redis://redis-staging:6379
      NOMIC_API_KEY: ${NOMIC_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ORIGIN_SECRET: ${STAGING_ORIGIN_SECRET:-}
      MCP_SERVER_PORT: "3002"
      LOG_LEVEL: debug
    expose:
      - "3002"
    networks:
      - toolpilot-staging
      - toolcairn_toolpilot   # join prod network so Caddy can proxy to api-staging
    depends_on:
      memgraph-staging:
        condition: service_healthy
      postgres-staging:
        condition: service_healthy
    ports:
      - "3002:3002"    # Expose staging API for direct testing

  memgraph-staging:
    image: memgraph/memgraph-mage:latest
    restart: unless-stopped
    command: ["--memory-limit=512", "--bolt-num-workers=2", "--log-level=WARNING"]
    volumes:
      - memgraph_staging:/var/lib/memgraph
    networks:
      - toolpilot-staging
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 --use_ssl=false >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  qdrant-staging:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_staging:/qdrant/storage
    networks:
      - toolpilot-staging

  postgres-staging:
    image: postgres:16-alpine
    restart: unless-stopped
    command: postgres -c shared_buffers=32MB -c max_connections=10
    environment:
      POSTGRES_DB: toolpilot_staging
      POSTGRES_USER: toolpilot
      POSTGRES_PASSWORD: ${STAGING_DB_PASS:-staging}
    volumes:
      - postgres_staging:/var/lib/postgresql/data
    networks:
      - toolpilot-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolpilot -d toolpilot_staging"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis-staging:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    networks:
      - toolpilot-staging

networks:
  toolpilot-staging:
    driver: bridge
  toolcairn_toolpilot:
    external: true   # join the production network so Caddy can reach api-staging

volumes:
  memgraph_staging:
  qdrant_staging:
  postgres_staging:
