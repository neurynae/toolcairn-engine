name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/indexer/**'
      - 'packages/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/neurynae/toolcairn-engine/api:latest
            ghcr.io/neurynae/toolcairn-engine/api:${{ github.sha }}

      - name: Build and push Indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/indexer/Dockerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/neurynae/toolcairn-engine/indexer:latest
            ghcr.io/neurynae/toolcairn-engine/indexer:${{ github.sha }}

      - name: Deploy to VPS via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_ACTOR: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          # Strip Windows CRLF line endings that corrupt the key format
          echo "${VPS_SSH_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          echo "" >> ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "deploy@${VPS_HOST}" bash -s << ENDSSH
            cd /opt/toolcairn
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GIT_ACTOR}" --password-stdin
            docker image prune -a -f
            docker builder prune -f
            echo "Disk after cleanup: \$(df -h / | tail -1 | awk '{print \$4}') free"
            curl -fsSL https://raw.githubusercontent.com/neurynae/toolcairn-engine/main/docker-compose.prod.yml -o docker-compose.prod.yml
            IMAGE_TAG=${GIT_SHA} docker compose -f docker-compose.prod.yml --env-file .env.prod pull api indexer
            IMAGE_TAG=${GIT_SHA} docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps api indexer
            docker image prune -f
            echo "Deployed ${GIT_SHA} at \$(date)"
          ENDSSH
