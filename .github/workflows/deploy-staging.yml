name: Deploy to Staging

on:
  push:
    branches: [develop]
    paths:
      - 'apps/api/**'
      - 'packages/**'

jobs:
  deploy-staging:
    name: Build & Deploy Staging API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (staging tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/neurynae/toolcairn/toolcairn-api:staging

      - name: Deploy to VPS staging namespace
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/toolcairn
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.staging.yml --env-file .env.prod pull api-staging
            docker compose -f docker-compose.staging.yml --env-file .env.prod up -d --no-deps api-staging
            docker image prune -f
            echo "Staging deployed at $(date)"
