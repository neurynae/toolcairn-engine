name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @toolcairn/db run db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @toolcairn/db run db:generate

      - name: Run unit tests
        run: pnpm test

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      memgraph:
        # Use slim image (memgraph-mage is 8GB+, too large for CI runners)
        image: memgraph/memgraph:latest
        ports:
          - "7687:7687"
        options: >-
          --health-cmd "bash -c '</dev/tcp/localhost/7687'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 60s

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: toolpilot
          POSTGRES_USER: toolpilot
          POSTGRES_PASSWORD: toolpilot
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U toolpilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - "6333:6333"
        options: >-
          --health-cmd "bash -c '</dev/tcp/localhost/6333'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        run: pnpm --filter @toolcairn/db db:migrate
        env:
          DATABASE_URL: postgresql://toolpilot:toolpilot@localhost:5432/toolpilot

      - name: Run integration tests
        run: pnpm test
        env:
          MEMGRAPH_URL: bolt://localhost:7687
          DATABASE_URL: postgresql://toolpilot:toolpilot@localhost:5432/toolpilot
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333
          NODE_ENV: test
