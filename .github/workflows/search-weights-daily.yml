name: Daily Search Weights Update

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily (1 hour after indexer)
  workflow_dispatch: {}    # manual trigger any time

jobs:
  update-weights:
    name: Update search weights from outcome feedback
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Run update-search-weights via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          envs: GHCR_TOKEN,GITHUB_ACTOR
          script: |
            cd /opt/toolcairn
            echo "Starting search weight update at $(date)"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml --env-file .env.prod --profile indexer \
              run --rm indexer node apps/indexer/dist/update-search-weights.js
            echo "Search weight update complete at $(date)"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
