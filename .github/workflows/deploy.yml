name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/indexer/**'
      - 'packages/**'
      - 'scripts/cron/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/neurynae/toolcairn-engine/api:latest
            ghcr.io/neurynae/toolcairn-engine/api:${{ github.sha }}

      - name: Build and push Indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/indexer/Dockerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/neurynae/toolcairn-engine/indexer:latest
            ghcr.io/neurynae/toolcairn-engine/indexer:${{ github.sha }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy docker-compose to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: scp docker-compose.prod.yml "deploy@${VPS_HOST}:/opt/toolcairn/docker-compose.prod.yml"

      - name: Sync cron scripts to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          scp scripts/cron/run-daily-indexer.sh scripts/cron/run-search-weights.sh \
              scripts/cron/run-weekly-graph.sh scripts/cron/cron-trigger-watcher.sh \
              "deploy@${VPS_HOST}:/opt/toolcairn/scripts/"
          ssh "deploy@${VPS_HOST}" "chmod +x /opt/toolcairn/scripts/*.sh"
          scp scripts/cron/crontab "deploy@${VPS_HOST}:/tmp/toolcairn-crontab"
          ssh "deploy@${VPS_HOST}" "crontab /tmp/toolcairn-crontab && rm /tmp/toolcairn-crontab"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_ACTOR: ${{ github.actor }}
        run: |
          ssh "deploy@${VPS_HOST}" bash << ENDSSH
            set -e
            cd /opt/toolcairn
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GIT_ACTOR}" --password-stdin
            docker image prune -a -f
            docker builder prune -f
            echo "Disk after cleanup: \$(df -h / | tail -1 | awk '{print \$4}') free"
            IMAGE_TAG=${GIT_SHA} docker compose -f docker-compose.prod.yml --env-file .env.prod pull api indexer
            IMAGE_TAG=${GIT_SHA} docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps api indexer
            docker image prune -f
            echo "Deployed ${GIT_SHA} at \$(date)"
          ENDSSH
