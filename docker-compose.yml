services:
  memgraph:
    image: memgraph/memgraph-mage:latest
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph_data:/var/lib/memgraph
    command: ["--also-log-to-stderr", "--log-level=WARNING"]
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 --use_ssl=false >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  memgraph-lab:
    image: memgraph/lab:latest
    ports:
      - "3000:3000"
    depends_on:
      memgraph:
        condition: service_healthy
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: 7687

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && printf \"GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: toolpilot
      POSTGRES_USER: toolpilot
      POSTGRES_PASSWORD: toolpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolpilot -d toolpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --stop-writes-on-bgsave-error no --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/web/.env.local
    environment:
      NODE_ENV: development
      MEMGRAPH_URL: bolt://memgraph:7687
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql://toolpilot:toolpilot@postgres:5432/toolpilot
      REDIS_URL: redis://redis:6379
      NOMIC_API_KEY: ${NOMIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      memgraph:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


volumes:
  memgraph_data:
  qdrant_data:
  postgres_data:
  redis_data:
